<!DOCTYPE html>
<!--
  PAINEL DE DISPONIBILIDADE — Calendar Sync
  Versao 3.16

  ─────────────────────────────────────────────────────────────────────────
  MANUTENCAO — LER ANTES DE ALTERAR ESTE FICHEIRO
  ─────────────────────────────────────────────────────────────────────────
  O bloco de manutencao completo do projeto esta no topo do merge_calendars.py.
  Especifico desta pagina:

  1. VERSAO. Subir PAINEL_VERSAO abaixo na mesma alteracao. A versao aparece
     ao lado do titulo: sem isso e impossivel saber, por uma captura de ecra,
     se a pessoa esta a ver a versao corrigida ou uma copia antiga.

  2. SEM I/O NESTA PAGINA. Os dados entram por <script src="output/dashboard.js">,
     que define window.SYNC_DATA. NAO trocar por fetch(): deixaria de funcionar
     ao abrir o ficheiro a partir do disco (o browser bloqueia por CORS) e
     acrescentaria uma espera com a pagina vazia.

  3. SEM ARMAZENAMENTO NO BROWSER. Nada de localStorage: o estado verdadeiro
     esta nos ficheiros gerados, e uma copia local desatualizada seria lida
     como a realidade.

  4. AUTOTESTES. Correm ao abrir a pagina, so em memoria, e mostram um aviso
     visivel no topo se falharem. NAO REMOVER: cada um protege uma conta de
     datas que, errada, mostra um quarto livre quando esta ocupado.

  5. TODO O CONTROLO FAZ ALGUMA COISA. Se acrescentar um botao que so se
     aplica nalguns casos, esconda-o ou mostre-o inativo com a razao.
-->
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Disponibilidade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Public+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0F2036;
  --paper:#EDF0F4;
  --surface:#FFFFFF;
  --azul:#1B4B8F;
  --azul-fundo:#D7E2F1;
  --ocre:#A9761B;
  --tijolo:#A33520;
  --musgo:#2F6B4F;
  --texto-suave:#5D708A;
  --linha:#D5DCE6;
  --raio:10px;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;background:var(--paper);color:var(--ink);
  font-family:"Public Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  font-size:15px;line-height:1.5;
}
.wrap{max-width:1140px;margin:0 auto;padding:0 20px 72px}

/* ---------- topo ---------- */
header.top{
  position:sticky;top:0;z-index:30;background:rgba(237,240,244,.92);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--linha);
}
.top-inner{max-width:1140px;margin:0 auto;padding:14px 20px;
  display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
h1{
  font-family:"Bricolage Grotesque","Public Sans",sans-serif;
  font-weight:800;font-size:clamp(22px,3.4vw,30px);letter-spacing:-.02em;margin:0;
}
.eyebrow{
  font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:11.5px;
  letter-spacing:.08em;text-transform:uppercase;color:var(--texto-suave);
}
.pill{
  font-family:"IBM Plex Mono",monospace;font-size:11.5px;letter-spacing:.04em;
  padding:3px 9px;border-radius:999px;border:1px solid currentColor;white-space:nowrap;
}
.pill.ok{color:var(--musgo)}
.pill.aviso{color:var(--ocre)}
.pill.erro{color:var(--tijolo)}
.spacer{flex:1}
.versao{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--texto-suave);
  border:1px solid var(--linha);border-radius:999px;padding:2px 7px}
.versao.desalinhada{color:var(--tijolo);border-color:var(--tijolo)}
#aviso-testes{max-width:1140px;margin:16px auto 0;padding:12px 16px;border-radius:10px;
  background:#FBE9E5;border:1px solid var(--tijolo);color:var(--tijolo);font-size:13px}
#aviso-testes b{display:block;margin-bottom:4px}
#aviso-testes ul{margin:6px 0 0;padding-left:18px;font-family:"IBM Plex Mono",monospace;font-size:11.5px}

/* ---------- controlo de horizonte ---------- */
.zoom{display:flex;gap:0;border:1px solid var(--linha);border-radius:999px;overflow:hidden;background:var(--surface)}
.zoom button{
  font-family:"IBM Plex Mono",monospace;font-size:11.5px;border:0;background:transparent;
  padding:6px 12px;cursor:pointer;color:var(--texto-suave);
}
.zoom button[aria-pressed="true"]{background:var(--ink);color:#fff}
.zoom button:focus-visible{outline:2px solid var(--azul);outline-offset:-2px}

/* ---------- casa ---------- */
section.casa{margin-top:40px}
.casa-cab{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.casa-cab h2{
  font-family:"Bricolage Grotesque",sans-serif;font-weight:600;font-size:19px;
  letter-spacing:-.01em;margin:0;
}
.casa-cab .conta{font-family:"IBM Plex Mono",monospace;font-size:11.5px;color:var(--texto-suave)}

/* ---------- fita ---------- */
.fita{background:var(--surface);border:1px solid var(--linha);border-radius:var(--raio);padding:14px 16px 8px;overflow:hidden}
.grelha{display:grid;grid-template-columns:minmax(78px,132px) 1fr;gap:8px 14px;align-items:center}
.meses{position:relative;height:15px}
.mes{
  position:absolute;top:0;font-family:"IBM Plex Mono",monospace;font-size:10.5px;
  letter-spacing:.06em;text-transform:uppercase;color:var(--texto-suave);
  padding-left:4px;border-left:1px solid var(--linha);height:15px;white-space:nowrap;
}
.rotulo{
  font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.pista{
  position:relative;height:26px;background:var(--azul-fundo);border-radius:5px;overflow:hidden;
}
.pista .divisao{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.75)}
.bloco{
  position:absolute;top:0;bottom:0;border:0;padding:0;cursor:pointer;
  background:var(--azul);border-radius:4px;transform-origin:left center;
}
.bloco.manual{background:var(--ocre)}
.bloco:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.hoje{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--tijolo);z-index:5;border-radius:2px}
@media (prefers-reduced-motion:no-preference){
  .bloco{animation:crescer .45s cubic-bezier(.22,.8,.3,1) backwards}
  @keyframes crescer{from{transform:scaleX(0);opacity:.4}to{transform:scaleX(1);opacity:1}}
}
.legenda{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;padding-top:10px;border-top:1px solid var(--linha)}
.legenda span{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--texto-suave)}
.amostra{width:12px;height:12px;border-radius:3px;display:inline-block}

/* ---------- cartões ---------- */
.cartao-topo{display:flex;gap:11px;align-items:flex-start;margin-bottom:2px}
.foto{width:64px;height:48px;border-radius:7px;object-fit:cover;flex:none;
  background:var(--paper);border:1px solid var(--linha)}
.cartao-topo .titulo{min-width:0}
.cartoes{display:grid;grid-template-columns:repeat(auto-fill,minmax(266px,1fr));gap:12px;margin-top:12px}
.cartao{background:var(--surface);border:1px solid var(--linha);border-radius:var(--raio);padding:14px 16px}
.cartao h3{font-size:14.5px;margin:0 0 2px;font-weight:600}
.estado{font-family:"IBM Plex Mono",monospace;font-size:12px;margin:6px 0 10px}
.estado.livre{color:var(--musgo)}
.estado.ocupado{color:var(--azul)}
.linha-info{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;padding:3px 0;color:var(--texto-suave)}
.linha-info b{font-family:"IBM Plex Mono",monospace;font-weight:500;color:var(--ink)}
.fontes{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.fonte{
  font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.03em;
  padding:2px 7px;border-radius:999px;border:1px solid var(--linha);color:var(--texto-suave);
}
.fonte.CACHE{border-color:var(--ocre);color:var(--ocre)}
.fonte.ERRO{border-color:var(--tijolo);color:var(--tijolo);font-weight:500}
.links{margin-top:11px;border-top:1px solid var(--linha);padding-top:9px}
.links .cab{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--texto-suave);margin-bottom:6px}
.link-linha{display:flex;align-items:center;gap:7px;margin-bottom:4px;font-size:12.5px}
.link-linha .ponto{width:7px;height:7px;border-radius:50%;flex:none}
.link-linha span{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-linha button{font-family:"IBM Plex Mono",monospace;font-size:10.5px;padding:3px 9px;
  border:1px solid var(--linha);background:transparent;color:var(--ink);border-radius:999px;
  cursor:pointer;flex:none}
.link-linha button:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.link-linha button:focus-visible{outline:2px solid var(--azul);outline-offset:2px}
.copiar{
  margin-top:12px;width:100%;font-family:"IBM Plex Mono",monospace;font-size:11.5px;
  padding:8px;border:1px solid var(--ink);background:transparent;color:var(--ink);
  border-radius:6px;cursor:pointer;letter-spacing:.03em;
}
.copiar:hover{background:var(--ink);color:#fff}
.copiar:focus-visible{outline:2px solid var(--azul);outline-offset:2px}


/* ---------- dialogo e ajuda ---------- */
.acao{font-family:"IBM Plex Mono",monospace;font-size:11.5px;letter-spacing:.04em;
  padding:6px 12px;border-radius:999px;border:1px solid var(--linha);background:var(--surface);
  color:var(--ink);cursor:pointer}
.acao:hover{border-color:var(--ink)}
.acao:focus-visible{outline:2px solid var(--azul);outline-offset:2px}
a.acao{display:inline-block;line-height:1.35}
dialog{border:0;border-radius:14px;padding:0;max-width:640px;width:calc(100% - 32px);
  background:var(--surface);color:var(--ink);box-shadow:0 18px 50px rgba(15,32,54,.22)}
dialog::backdrop{background:rgba(15,32,54,.4)}
.dlg-topo{display:flex;align-items:baseline;gap:12px;padding:18px 22px 12px;
  border-bottom:1px solid var(--linha);position:sticky;top:0;background:var(--surface);z-index:2}
.dlg-topo h2{font-family:"Bricolage Grotesque",sans-serif;font-weight:600;font-size:18px;margin:0}
.dlg-corpo{padding:16px 22px 22px;max-height:min(68vh,620px);overflow:auto}
.dlg-corpo h3{font-size:14px;margin:18px 0 4px;font-weight:600}
.dlg-corpo h3:first-child{margin-top:0}
.dlg-corpo p{margin:0 0 8px;font-size:13.5px;color:var(--texto-suave)}
.dlg-corpo code{font-family:"IBM Plex Mono",monospace;font-size:11.5px;background:var(--paper);
  padding:1px 5px;border-radius:4px;color:var(--ink);word-break:break-all}
.dlg-corpo ul{margin:0 0 8px;padding-left:18px;font-size:13.5px;color:var(--texto-suave)}
.fechar{margin-left:auto;border:0;background:transparent;font-size:20px;line-height:1;
  cursor:pointer;color:var(--texto-suave);padding:0 4px}
.fechar:hover{color:var(--ink)}

/* ---------- editor de ligacoes ---------- */
.ed-quarto{border:1px solid var(--linha);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.ed-quarto h4{margin:0 0 8px;font-size:13.5px;font-weight:600}
.ed-quarto h4 span{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--texto-suave);
  font-weight:400;margin-left:6px}
.ed-linha{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.ed-linha input{font-family:"IBM Plex Mono",monospace;font-size:11.5px;padding:6px 8px;
  border:1px solid var(--linha);border-radius:6px;background:var(--paper);color:var(--ink);min-width:0}
.ed-linha input.plataforma{width:130px;flex:none}
.ed-linha input.url{flex:1}
.ed-linha input:focus{outline:2px solid var(--azul);outline-offset:-1px;background:var(--surface)}
.ed-linha .ponto{width:9px;height:9px;border-radius:50%;flex:none}
.ed-remover{border:0;background:transparent;color:var(--texto-suave);cursor:pointer;
  font-size:15px;padding:2px 6px;line-height:1}
.ed-remover:hover{color:var(--tijolo)}
.ed-aviso{font-size:11.5px;margin:2px 0 8px 15px;color:var(--ocre)}
.ed-aviso.erro{color:var(--tijolo)}
.ed-colar{margin-top:8px;padding-top:10px;border-top:1px dashed var(--linha)}
.ed-colar label{display:block;font-size:11.5px;color:var(--texto-suave);margin-bottom:5px}
.ed-foto{font-size:11.5px;color:var(--texto-suave);margin-top:8px}
.ed-foto code{font-family:"IBM Plex Mono",monospace;font-size:10.5px;background:var(--paper);
  padding:1px 5px;border-radius:4px}
.ed-rodape{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--linha);
  padding:12px 0 0;margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.ed-nota{font-size:12.5px;color:var(--texto-suave);margin:0 0 12px}
.acao.primaria{background:var(--ink);color:#fff;border-color:var(--ink)}
.acao.primaria:hover{opacity:.88}

/* ---------- pontos de plataforma ---------- */
.fonte{display:inline-flex;align-items:center;gap:5px}
.fonte .ponto{width:7px;height:7px;border-radius:50%;flex:none}
.legenda .amostra.redonda{border-radius:50%}

/* ---------- vazio / erro ---------- */
.vazio{background:var(--surface);border:1px dashed var(--linha);border-radius:var(--raio);
  padding:28px;margin-top:40px;text-align:center;color:var(--texto-suave)}
.vazio b{display:block;color:var(--ink);font-size:16px;margin-bottom:6px}
.dica{font-family:"IBM Plex Mono",monospace;font-size:11.5px}

/* ---------- balão ---------- */
#balao{
  position:fixed;z-index:60;background:var(--ink);color:#fff;border-radius:7px;
  padding:8px 11px;font-size:12px;line-height:1.4;pointer-events:none;opacity:0;
  transition:opacity .12s;max-width:230px;
}
#balao .datas{font-family:"IBM Plex Mono",monospace;font-size:11px;color:#B9CBE4}
@media (max-width:560px){
  .grelha{grid-template-columns:72px 1fr;gap:7px 8px}
  .rotulo{font-size:12px}
}
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <h1>Disponibilidade</h1>
    <span class="versao" id="versao"></span>
    <span class="eyebrow" id="carimbo">a carregar…</span>
    <span id="estado-geral"></span>
    <span class="spacer"></span>
    <a class="acao" href="inquilinos.html" style="text-decoration:none">Inquilinos</a>
    <button class="acao" id="btn-ligacoes">Ligações</button>
    <button class="acao" id="btn-ajuda">Ajuda</button>
    <div class="zoom" role="group" aria-label="Horizonte da fita">
      <button data-dias="90" aria-pressed="false">3 meses</button>
      <button data-dias="180" aria-pressed="true">6 meses</button>
      <button data-dias="365" aria-pressed="false">12 meses</button>
    </div>
  </div>
</header>

<div id="aviso-testes" hidden></div>
<main class="wrap" id="conteudo"></main>
<div id="balao" role="tooltip"></div>

<dialog id="dlg-ajuda">
  <div class="dlg-topo"><h2>Ajuda</h2><span class="eyebrow" id="ajuda-versao"></span>
    <button class="fechar" aria-label="Fechar">&times;</button></div>
  <div class="dlg-corpo" id="ajuda-corpo"></div>
</dialog>

<dialog id="dlg-ligacoes">
  <div class="dlg-topo"><h2>Ligações às plataformas</h2>
    <button class="fechar" aria-label="Fechar">&times;</button></div>
  <div class="dlg-corpo" id="ligacoes-corpo"></div>
</dialog>

<script src="output/dashboard.js" onerror="window.SYNC_ERRO=true"></script>
<script>
(function(){
  const PAINEL_VERSAO = "3.16";

  // PLATAFORMAS — cor e endereco de cada plataforma. As cores foram tiradas dos
  // proprios logos, exceto onde esta dito. Corrige aqui e em mais lado nenhum.
  // Uma plataforma fora desta lista recebe na mesma uma cor propria e estavel.
  // AJUDA: cores
  const PLATAFORMAS = {
    // azul Mariner, dos recursos de marca. O azul-escuro do logo (#0A0777) e a
    // cor dominante deles, mas ao lado do texto do painel le-se como preto.
    "spotahome":       {cor:"#2C75DB", dominio:"spotahome.com"},
    "flatio":          {cor:"#F6C004", dominio:"flatio.com"},
    "housinganywhere": {cor:"#FF4B28", dominio:"housinganywhere.com"},
    "uniplaces":       {cor:"#00AEEF", dominio:"uniplaces.com"},
    "spacest":         {cor:"#D93558", dominio:"spacest.com"},
    "idealista":       {cor:"#7BA428", dominio:"idealista.pt"},   // por confirmar
    "airbnb":          {cor:"#FF5A5F", dominio:"airbnb.com"},
    "booking":         {cor:"#003580", dominio:"booking.com"},
    "badi":            {cor:"#00A8A8", dominio:"badi.com"},
    "erasmusplay":     {cor:"#F2A20C", dominio:"erasmusplay.com"}
  };
  const CORES_EXTRA = ["#1B4B8F","#7A3E9D","#0E7C7B","#A34E7B","#3D6B35","#8A5A2B","#2E5E8C","#6B3FA0"];

  const chave = nome => (nome || "").toLowerCase().replace(/[^a-z0-9]/g, "");

  function corPlataforma(nome){
    if ((nome || "").startsWith("manual:")) return "var(--ocre)";
    const k = chave(nome);
    if (PLATAFORMAS[k]) return PLATAFORMAS[k].cor;
    let soma = 0;
    for (let i = 0; i < k.length; i++) soma = (soma * 31 + k.charCodeAt(i)) % 9973;
    return CORES_EXTRA[soma % CORES_EXTRA.length];
  }

  function detectarPlataforma(url){
    const alvo = (url || "").toLowerCase();
    for (const [k, v] of Object.entries(PLATAFORMAS)){
      if (alvo.includes(v.dominio)) return k.charAt(0).toUpperCase() + k.slice(1);
    }
    return "";
  }

  function fundoDoBloco(fontes){
    const cores = fontes.map(corPlataforma);
    if (cores.length === 1) return cores[0];
    const fatia = 100 / cores.length;
    const paragens = cores.map((c, i) =>
      `${c} ${(i * fatia).toFixed(2)}%, ${c} ${((i + 1) * fatia).toFixed(2)}%`);
    return `linear-gradient(90deg, ${paragens.join(", ")})`;
  }

  // AJUDA — texto para quem usa. Se mudares comportamento, ATUALIZA AQUI na
  // mesma alteracao. Os sitios do codigo que obrigam a rever este texto estao
  // marcados com "AJUDA: <seccao>", e o verificar.py confirma que a seccao existe.
  const AJUDA = [
    ["atalhos", `<p>Os endereços acima levam a tudo o que precisas. Os três últimos
      são no GitHub, e é lá que se mexe na configuração — mais nada precisa de lá
      ser feito.</p>`],
    ["o que isto faz", `<p>Junta os calendários das várias plataformas num único
      ficheiro por quarto e publica-o num endereço fixo. Cada plataforma importa
      esse endereço e passa a ver as reservas feitas em todas as outras.</p>
      <p>Corre sozinho de 15 em 15 minutos. Não é preciso abrir esta página para
      que funcione — ela só mostra o resultado.</p>`],
    ["ler a fita", `<p>Uma linha por quarto. Cada barra é um período ocupado, com a
      cor da plataforma onde a reserva foi feita. Uma barra com duas cores é uma
      reserva conhecida por duas plataformas.</p>
      <ul><li>ocre: bloqueio teu, não veio de plataforma nenhuma</li>
      <li>traço vermelho à esquerda: hoje</li>
      <li>toca ou passa o rato numa barra para ver datas, noites e origem</li></ul>
      <p>O seletor no topo muda o horizonte entre 3, 6 e 12 meses.</p>`],
    ["cores", `<p>Cada plataforma tem a cor do seu logo. Uma plataforma que não
      esteja na lista recebe uma cor própria, sempre a mesma, calculada a partir
      do nome.</p>
      <p>Duas plataformas com logos parecidos ficam com barras parecidas — é o
      caso do vermelho da HousingAnywhere e do carmim da Spacest. Se te
      atrapalhar, muda uma delas: as cores estão todas em <code>PLATAFORMAS</code>,
      no princípio do <code>index.html</code>.</p>`],
    ["adicionar uma plataforma", `<p>Botão <b>Ligações</b>. Colas o endereço de
      exportação e o nome da plataforma é adivinhado pelo endereço.</p>
      <p>Esta página não grava nada sozinha: no fim copias o texto e colas no
      <code>calendars.json</code> no GitHub. É lá que vive a configuração.</p>
      <p>Tem de ser o endereço de <b>exportação</b> (acaba tipicamente em
      <code>.ics</code>), não o endereço da página do calendário no site — esse
      exige sessão iniciada e devolve a página, não as datas.</p>`],
    ["dar o teu calendário às plataformas", `<p>Cada quarto tem <b>um link por
      plataforma</b>, e não um só. O link "Para a Spotahome" leva tudo <i>menos</i>
      as reservas da Spotahome.</p>
      <p>Porquê: se importares para a Spotahome um calendário que já inclui as
      reservas dela, ela cria um bloqueio externo por cima das reservas que já tem.
      Fica ilegível, e há plataformas que tratam a sobreposição como erro e

  const MES = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  const conteudo = document.getElementById("conteudo");
  const balao = document.getElementById("balao");
  let dias = 180;

  const d = iso => { const [a,m,g] = iso.split("-").map(Number); return new Date(a, m-1, g); };
  const fmt = data => data.getDate() + " " + MES[data.getMonth()];
  const fmtLongo = data => fmt(data) + " " + data.getFullYear();
  const noites = (a,b) => Math.round((b-a)/86400000);
  const hoje = () => { const n = new Date(); return new Date(n.getFullYear(), n.getMonth(), n.getDate()); };

  function haQuanto(iso){
    const minutos = Math.max(0, Math.round((Date.now() - new Date(iso)) / 60000));
    if (minutos < 1) return "agora mesmo";
    if (minutos < 60) return "há " + minutos + " min";
    const horas = Math.round(minutos/60);
    if (horas < 24) return "há " + horas + (horas === 1 ? " hora" : " horas");
    const dd = Math.round(horas/24);
    return "há " + dd + (dd === 1 ? " dia" : " dias");
  }

  function urlIcs(rel){                                    // AJUDA: versões e atualizações
    // o endereco fixado na configuracao ganha sempre: e o unico que funciona
    // com a pagina aberta a partir do disco
    const base = (window.SYNC_DATA && window.SYNC_DATA.site_url) || "";
    if (base) return base + "/output/" + rel;
    if (location.protocol === "file:") return "output/" + rel;
    return new URL("output/" + rel, location.href).href;
  }

  function mostrarBalao(alvo, html){
    balao.innerHTML = html;

    let x = r.left + r.width/2 - b.width/2;
    x = Math.max(8, Math.min(x, window.innerWidth - b.width - 8));
    let y = r.top - b.height - 9;
    if (y < 8) y = r.bottom + 9;
    balao.style.left = x + "px";
    balao.style.top = y + "px";
  }
  const esconderBalao = () => { balao.style.opacity = "0"; };

  function marcasDeMes(inicio, total){
    const marcas = [];
    const cursor = new Date(inicio.getFullYear(), inicio.getMonth(), 1);
    if (cursor < inicio) cursor.setMonth(cursor.getMonth()+1);
    while (true){
      const desloc = noites(inicio, cursor);
      if (desloc >= total) break;
      marcas.push({pos: desloc/total*100, texto: MES[cursor.getMonth()] +
        (cursor.getMonth() === 0 ? " " + String(cursor.getFullYear()).slice(2) : "")});
      cursor.setMonth(cursor.getMonth()+1);
    }
    return marcas;
  }

  function estadoQuarto(quarto, inicio){
    const blocos = quarto.blocks.map(b => ({ini: d(b.start), fim: d(b.end), fontes: b.sources}));
    const atual = blocos.find(b => b.ini <= inicio && b.fim > inicio);
    const seguinte = blocos.filter(b => b.ini > inicio).sort((a,b) => a.ini-b.ini)[0];
    const limite = new Date(inicio); limite.setDate(limite.getDate()+90);
    let ocupados = 0;
    blocos.forEach(b => {
      const de = b.ini > inicio ? b.ini : inicio;
      const ate = b.fim < limite ? b.fim : limite;
      if (ate > de) ocupados += noites(de, ate);
    });
    return {blocos, atual, seguinte, ocupacao: Math.round(ocupados/90*100)};
  }

  function correrTestes(){
    const falhas = [];
    TESTES.forEach(([nome, verificacao]) => {
      let queixa;
      try { queixa = verificacao(); } catch (e) { queixa = "rebentou: " + e.message; }
      if (queixa) falhas.push(nome + " → " + queixa);
    });
    if (falhas.length){
      const caixa = document.getElementById("aviso-testes");
      caixa.hidden = false;
      caixa.innerHTML = "<b>Este painel tem um problema — os números podem estar errados</b>" +
        "Falharam " + falhas.length + " verificações internas. Não tomes decisões de " +
        "disponibilidade por esta página até isto estar resolvido." +
        "<ul>" + falhas.map(f => "<li>" + f + "</li>").join("") + "</ul>";
    }
    return falhas;
  }

  // Atalhos para os sitios onde se mexe. Calculados a partir do endereco, para
  // funcionarem em qualquer instalacao sem ninguem os escrever.  // AJUDA: atalhos
  function atalhos(){
    const base = (window.SYNC_DATA && window.SYNC_DATA.site_url) || location.origin + location.pathname;
    const m = base.match(/^https?:\/\/([^.]+)\.github\.io\/([^/]+)/);
    const site = base.replace(/\/$/, "");
    if (!m) return {site};
    const repo = "https://github.com/" + m[1] + "/" + m[2];
    return {
      site,
      registo: site + "/inquilinos.html",
      configurar: repo + "/edit/main/calendars.json",
      subir: repo + "/upload/main",
      sincronizar: repo + "/actions/workflows/sync-calendars.yml",
      gerados: repo + "/tree/main/output",
      repositorio: repo
    };
  }

  function urlGithub(){
    const anfitriao = location.hostname.match(/^([^.]+)\.github\.io$/);
    const repo = location.pathname.split("/").filter(Boolean)[0];
    if (!anfitriao || !repo) return null;
    return "https://github.com/" + anfitriao[1] + "/" + repo + "/edit/main/calendars.json";
  }

  function queixaDoLink(url){
    if (!url.trim()) return ["", "por preencher — esta fonte não vai ser lida"];
    if (!/^https?:\/\//.test(url)) return ["erro", "não é um endereço web"];
    if (/\/my\/|useUnitType/.test(url))
      return ["erro", "é o endereço da página do site, não o de exportação: exige sessão iniciada"];
    if (!/\.ics|calendar|ical/i.test(url))
      return ["", "não parece um endereço de calendário — confirma que é o de exportação"];
    return null;
  }

      'copias o texto e colas no <code>calendars.json</code> no GitHub.</p>';

    rascunho.properties.forEach((casa, ic) => {
      (casa.rooms || []).forEach((quarto, iq) => {
        const caixa = document.createElement("div");

        caixa.innerHTML = "<h4>" + (quarto.name || quarto.id) +
          "<span>" + (casa.name || casa.id) + "</span></h4>";

          linha.className = "ed-linha";

          nome.setAttribute("aria-label", "Nome da plataforma");

          const url = document.createElement("input");
          url.className = "url";
          url.value = fonte.url || "";
          url.placeholder = "https://…";
          url.setAttribute("aria-label", "Endereço de exportação");

          const remover = document.createElement("button");
          remover.className = "ed-remover";
          remover.innerHTML = "&times;";
          remover.title = "Remover esta fonte";
          remover.setAttribute("aria-label", "Remover " + (fonte.platform || "fonte"));

          url.addEventListener("input", () => {
            fonte.url = url.value.trim();
            if (!nome.value.trim()){
              const adivinhado = detectarPlataforma(fonte.url);
              if (adivinhado){ nome.value = adivinhado; fonte.platform = adivinhado; }
            }
            ponto.style.background = corPlataforma(fonte.platform);
            atualizarAviso();
          });
          nome.addEventListener("input", () => {
            fonte.platform = nome.value.trim();
            ponto.style.background = corPlataforma(fonte.platform);
          });
          remover.addEventListener("click", () => {
            quarto.sources.splice(ifn, 1);
            desenharLigacoes();

          linha.append(ponto, nome, url, remover);
          caixa.appendChild(linha);

          function atualizarAviso(){
            const queixa = queixaDoLink(fonte.url || "");
            aviso.className = "ed-aviso" + (queixa && queixa[0] === "erro" ? " erro" : "");
            aviso.textContent = queixa ? queixa[1] : "";
          }
          atualizarAviso();
          caixa.appendChild(aviso);
        });

        // campo de colar, sempre visivel: e aqui que se acrescenta uma plataforma
        const colar = document.createElement("div");        // AJUDA: adicionar uma plataforma
        colar.className = "ed-colar";
        const etiqueta = document.createElement("label");
        etiqueta.textContent = "Colar aqui o link de exportação de uma plataforma nova";
        const campo = document.createElement("input");
        campo.className = "url";
        campo.style.width = "100%";
        campo.placeholder = "https://…";
        campo.setAttribute("aria-label",
          "Colar link de plataforma nova em " + (quarto.name || quarto.id));

        function aceitar(){
          const url = campo.value.trim();
          if (!url) return;
          const queixa = queixaDoLink(url);
          if (queixa && queixa[0] === "erro"){
            campo.style.borderColor = "var(--tijolo)";
            let jaExiste = colar.querySelector(".ed-aviso");
            if (!jaExiste){
              jaExiste = document.createElement("div");
              jaExiste.className = "ed-aviso erro";
              colar.appendChild(jaExiste);
            }
            jaExiste.textContent = queixa[1];
            return;
          }
          quarto.sources = quarto.sources || [];
          quarto.sources.push({platform: detectarPlataforma(url), url: url});
          desenharLigacoes();
        }
        campo.addEventListener("change", aceitar);
        campo.addEventListener("paste", () => setTimeout(aceitar, 0));
        colar.append(etiqueta, campo);
        caixa.appendChild(colar);

        const dicaFoto = document.createElement("div");     // AJUDA: fotos dos quartos
        dicaFoto.className = "ed-foto";
        const temFoto = FOTOS[casa.id + "/" + quarto.id];
        dicaFoto.innerHTML = temFoto
          ? "Foto: <code>" + temFoto + "</code> — para trocar, sobe outra com o mesmo nome."
          : "Sem foto. Sobe uma imagem para <code>fotos/" + casa.id + "/" + quarto.id +
            ".jpg</code> no repositório e ela aparece aqui.";
        caixa.appendChild(dicaFoto);

        corpo.appendChild(caixa);
      });
    });

    const rodape = document.createElement("div");
    rodape.className = "ed-rodape";
    const copiar = document.createElement("button");
    copiar.className = "acao primaria";
    copiar.textContent = "Copiar calendars.json";
    copiar.addEventListener("click", async () => {
      const texto = JSON.stringify(rascunho, null, 2);
      try { await navigator.clipboard.writeText(texto); copiar.textContent = "Copiado"; }
      catch { copiar.textContent = "Não deu para copiar"; }
      setTimeout(() => { copiar.textContent = "Copiar calendars.json"; }, 2200);
    });
    rodape.appendChild(copiar);

    const link = urlGithub();
    if (link){
      const abrir = document.createElement("a");
      abrir.className = "acao";
      abrir.href = link;
      abrir.target = "_blank";
      abrir.rel = "noopener";
      abrir.textContent = "Abrir o calendars.json no GitHub";
      rodape.appendChild(abrir);
    }
    const nota = document.createElement("span");
    nota.style.cssText = "font-size:12px;color:var(--texto-suave)";
    nota.textContent = "Copiar → colar por cima de tudo → Commit changes.";
    rodape.appendChild(nota);
    corpo.appendChild(rodape);
  }

  function desenhar(){
    const dados = window.SYNC_DATA;
    conteudo.innerHTML = "";

    if (window.SYNC_ERRO || !dados){
      conteudo.innerHTML = '<div class="vazio"><b>Ainda não há dados de sincronização</b>' +
        'Corre o merge_calendars.py — ele escreve output/dashboard.js, que é o que esta página lê.' +
        '<div class="dica" style="margin-top:10px">python merge_calendars.py</div></div>';
      document.getElementById("carimbo").textContent = "sem dados";
      return;
    }

    document.getElementById("carimbo").textContent = "sincronizado " + haQuanto(dados.generated_at);

    const chip = document.getElementById("versao");          // AJUDA: versões e atualizações
    const motor = dados.engine_version;
    if (motor && motor !== PAINEL_VERSAO){
      chip.className = "versao desalinhada";
      chip.textContent = "painel v" + PAINEL_VERSAO + " · motor v" + motor;
      chip.title = "O painel e o motor estão em versões diferentes. Atualiza o ficheiro mais antigo.";
    } else {
      chip.textContent = "v" + PAINEL_VERSAO;
    }
    const todasFontes = dados.properties.flatMap(p => p.rooms.flatMap(q => q.sources));
    const erros = todasFontes.filter(f => f.state === "ERRO").length;
    const caches = todasFontes.filter(f => f.state === "CACHE").length;
    const geral = document.getElementById("estado-geral");
    geral.className = "pill " + (erros ? "erro" : caches ? "aviso" : "ok");
    geral.textContent = erros
      ? erros + (erros === 1 ? " fonte em erro" : " fontes em erro")
      : caches
        ? caches + (caches === 1 ? " fonte em cache" : " fontes em cache")
        : todasFontes.length + " fontes ligadas";

    if (!dados.properties.length){
      conteudo.innerHTML = '<div class="vazio"><b>Nenhuma casa configurada</b>' +
        'Acrescenta uma casa e os links das plataformas no calendars.json.</div>';
      return;
    }

    rascunho = dados.config ? JSON.parse(JSON.stringify(dados.config)) : null;
    dados.properties.forEach(casa => casa.rooms.forEach(quarto => {
      if (quarto.photo) FOTOS[casa.id + "/" + quarto.id] = quarto.photo;
    }));

    const inicio = hoje();
    const total = dias;

    dados.properties.forEach(casa => {
      const seccao = document.createElement("section");
      seccao.className = "casa";

      const nQuartos = casa.rooms.length;
      const livres = casa.rooms.filter(q => !estadoQuarto(q, inicio).atual).length;
      seccao.innerHTML =
        '<div class="casa-cab"><h2>' + casa.name + '</h2>' +
        '<span class="conta">' + nQuartos + (nQuartos === 1 ? " quarto" : " quartos") +
        " · " + livres + " livre" + (livres === 1 ? "" : "s") + " hoje</span></div>";

      // fita
      const fita = document.createElement("div");
      fita.className = "fita";
      const grelha = document.createElement("div");
      grelha.className = "grelha";

      grelha.appendChild(document.createElement("div"));
      const faixaMeses = document.createElement("div");
      faixaMeses.className = "meses";
      marcasDeMes(inicio, total).forEach(m => {
        const el = document.createElement("span");
        el.className = "mes";
        el.style.left = m.pos + "%";
        el.textContent = m.texto;
        faixaMeses.appendChild(el);
      });
      grelha.appendChild(faixaMeses);

      casa.rooms.forEach((quarto, i) => {
        const rotulo = document.createElement("div");
        rotulo.className = "rotulo";
        rotulo.textContent = quarto.name;
        grelha.appendChild(rotulo);

        const pista = document.createElement("div");
        pista.className = "pista";
        marcasDeMes(inicio, total).forEach(m => {
          const div = document.createElement("div");
          div.className = "divisao";
          div.style.left = m.pos + "%";
          pista.appendChild(div);
        });

        // cada reserva pintada nas suas datas. Um bloco fundido com varias
        // plataformas nao diz onde comeca cada uma — por isso usamos os
        // intervalos por origem quando existem.        // AJUDA: ler a fita
        const pintaveis = (quarto.intervalos && quarto.intervalos.length)
          ? quarto.intervalos.map(i => ({ini: d(i.start), fim: d(i.end), fontes: [i.source]}))
          : estadoQuarto(quarto, inicio).blocos;
        pintaveis.forEach((b, j) => {
          const fim = new Date(inicio); fim.setDate(fim.getDate() + total);
          if (b.fim <= inicio || b.ini >= fim) return;
          const de = b.ini > inicio ? b.ini : inicio;
          const ate = b.fim < fim ? b.fim : fim;
          const barra = document.createElement("button");            // AJUDA: ler a fita
          const manual = b.fontes.every(f => f.startsWith("manual:"));
          barra.className = "bloco" + (manual ? " manual" : "");
          barra.style.background = fundoDoBloco(b.fontes);
          barra.style.left = (noites(inicio, de)/total*100) + "%";
          barra.style.width = Math.max(noites(de, ate)/total*100, 0.35) + "%";
          barra.style.animationDelay = (i*60 + j*25) + "ms";
          const nomes = b.fontes.map(f => f.replace(/^manual:/, "")).join(" + ");
          const texto = fmtLongo(b.ini) + " → " + fmtLongo(b.fim) + " · " +
                        noites(b.ini, b.fim) + " noites";
          barra.setAttribute("aria-label", quarto.name + ": ocupado de " + texto + " (" + nomes + ")");
          const html = "<b>" + nomes + "</b><div class='datas'>" + texto + "</div>";
          barra.addEventListener("mouseenter", () => mostrarBalao(barra, html));
          barra.addEventListener("focus", () => mostrarBalao(barra, html));
          barra.addEventListener("mouseleave", esconderBalao);
          barra.addEventListener("blur", esconderBalao);
          barra.addEventListener("click", e => { e.stopPropagation(); mostrarBalao(barra, html); });
          pista.appendChild(barra);
        });

        const marcaHoje = document.createElement("div");
        marcaHoje.className = "hoje";
        marcaHoje.style.left = "0%";
        marcaHoje.title = "hoje";
        pista.appendChild(marcaHoje);

        grelha.appendChild(pista);
      });

      fita.appendChild(grelha);

      const plataformas = [...new Set(casa.rooms.flatMap(q => q.sources.map(f => f.platform)))];
      const temManual = casa.rooms.some(q =>
        q.blocks.some(b => b.sources.some(f => f.startsWith("manual:"))));
      fita.insertAdjacentHTML("beforeend",
        '<div class="legenda">' +
        '<span><i class="amostra" style="background:var(--azul-fundo)"></i>livre</span>' +
        plataformas.map(p =>
          '<span><i class="amostra redonda" style="background:' + corPlataforma(p) + '"></i>' +
          p + '</span>').join("") +
        (temManual ? '<span><i class="amostra redonda" style="background:var(--ocre)"></i>bloqueio meu</span>' : "") +
        '<span><i class="amostra" style="background:var(--tijolo);width:3px"></i>hoje</span>' +
        '</div>');
      seccao.appendChild(fita);

      // cartões
      const cartoes = document.createElement("div");
      cartoes.className = "cartoes";
      casa.rooms.forEach(quarto => {
        const e = estadoQuarto(quarto, inicio);
        const cartao = document.createElement("div");
        cartao.className = "cartao";

        let estadoHtml;
        if (e.atual){
          estadoHtml = '<div class="estado ocupado">Ocupado até ' + fmt(e.atual.fim) +
            " · " + noites(inicio, e.atual.fim) + " noites</div>";
        } else if (e.seguinte){
          estadoHtml = '<div class="estado livre">Livre · próxima entrada ' + fmt(e.seguinte.ini) + "</div>";
        } else {
          estadoHtml = '<div class="estado livre">Livre · sem reservas marcadas</div>';
        }

        const proxima = e.seguinte ? fmt(e.seguinte.ini) : "—";

        const foto = quarto.photo                                  // AJUDA: fotos dos quartos
          ? '<img class="foto" src="' + quarto.photo + '" alt="" loading="lazy" ' +
            "onerror=\"this.style.display='none'\">"
          : "";
        cartao.innerHTML =
          '<div class="cartao-topo">' + foto + '<div class="titulo">' +
          "<h3>" + quarto.name + "</h3>" + estadoHtml + "</div></div>" +
          '<div class="linha-info"><span>Ocupação nos próximos 90 dias</span><b>' + e.ocupacao + "%</b></div>" +
          '<div class="linha-info"><span>Próxima entrada</span><b>' + proxima + "</b></div>" +
          '<div class="linha-info"><span>Blocos no calendário</span><b>' + quarto.blocks.length + "</b></div>" +
          '<div class="fontes">' + quarto.sources.map(f =>
            '<span class="fonte ' + f.state + '" title="' +
            (f.ecos ? f.ecos + " bloqueio(s) nosso(s) devolvido(s) por esta plataforma e ignorado(s)"
                    : "leitura direta da plataforma") + '"><i class="ponto" style="background:' +
            corPlataforma(f.platform) + '"></i>' + f.platform + " · " + f.state +
            (f.ecos ? " · " + f.ecos + " eco" : "") + "</span>").join("") +
          "</div>";

        // um link por plataforma: o calendario que se da a uma plataforma nao
        // leva as reservas dessa mesma plataforma   // AJUDA: dar o teu calendário às plataformas
        const feeds = (quarto.feeds && quarto.feeds.length)
          ? quarto.feeds
          : [{platform: null, para: "Qualquer plataforma", path: quarto.ics}];
        const caixaLinks = document.createElement("div");
        caixaLinks.className = "links";
        caixaLinks.innerHTML = '<div class="cab">Links a colar em cada plataforma</div>';
        const paraPlataformas = feeds.filter(f => !f.detalhe);
        const pessoais = feeds.filter(f => f.detalhe);
        if (quarto.agenda)
          pessoais.push({platform: null, detalhe: true, path: quarto.agenda,
                         para: "Agenda da casa toda"});
        paraPlataformas.concat(pessoais).forEach((feed, indice) => {
          if (indice === paraPlataformas.length && pessoais.length){
            const cab = document.createElement("div");   // AJUDA: calendário pessoal
            cab.className = "cab";
            cab.style.marginTop = "9px";
            cab.textContent = "Para o teu calendário pessoal";
            caixaLinks.appendChild(cab);
          }
          const linha = document.createElement("div");
          linha.className = "link-linha";
          const ponto = document.createElement("i");
          ponto.className = "ponto";
          ponto.style.background = feed.platform ? corPlataforma(feed.platform) : "var(--texto-suave)";
          const texto = document.createElement("span");
          texto.textContent = feed.platform ? "Para a " + feed.platform : feed.para;
          texto.title = feed.platform
            ? "Sem as reservas da " + feed.platform + ", que ela já conhece"
            : (feed.detalhe ? "Com quarto e plataforma no título, para subscreveres no Google"
                            : "Leva tudo — para uma plataforma que ainda não é origem");
          const botao = document.createElement("button");
          botao.textContent = "Copiar";
          botao.addEventListener("click", async () => {
            const url = urlIcs(feed.path);
            try { await navigator.clipboard.writeText(url); botao.textContent = "Copiado"; }
            catch { botao.textContent = "falhou"; }
            setTimeout(() => { botao.textContent = "Copiar"; }, 1800);
          });
          linha.append(ponto, texto, botao);
          caixaLinks.appendChild(linha);
        });
        cartao.appendChild(caixaLinks);
        cartoes.appendChild(cartao);
      });
      seccao.appendChild(cartoes);
      conteudo.appendChild(seccao);
    });
  }

  document.querySelectorAll(".zoom button").forEach(botao => {
    botao.addEventListener("click", () => {
      dias = Number(botao.dataset.dias);
      document.querySelectorAll(".zoom button").forEach(b =>
        b.setAttribute("aria-pressed", String(b === botao)));
      desenhar();
    });
  });
  document.getElementById("btn-ajuda").addEventListener("click", abrirAjuda);
  document.getElementById("btn-ligacoes").addEventListener("click", abrirLigacoes);
  document.querySelectorAll("dialog .fechar").forEach(botao =>
    botao.addEventListener("click", () => botao.closest("dialog").close()));
  document.querySelectorAll("dialog").forEach(dlg =>
    dlg.addEventListener("click", evento => { if (evento.target === dlg) dlg.close(); }));

  correrTestes();
  document.getElementById("versao").textContent = "v" + PAINEL_VERSAO;
  document.addEventListener("click", esconderBalao);
  window.addEventListener("resize", esconderBalao);
  desenhar();
})();
</script>
</body>
</html>
